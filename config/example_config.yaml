seed: 42

# real (default) or sample
data_source: real

paths:
  historical_matches: data/raw/historical_matches.csv
  upcoming_matches: data/raw/upcoming_matches.csv
  model_output: outputs/models
  picks_output: outputs/picks

real_data:
  historical_results_path: data/raw/real/historical_match_results.csv
  historical_odds_path: data/raw/real/historical_moneyline_odds.csv
  upcoming_matches_path: data/raw/real/upcoming_matches.csv
  upcoming_odds_path: data/raw/real/upcoming_moneyline_odds.csv

  output_historical_merged_csv: data/processed/historical_merged.csv
  output_upcoming_merged_csv: data/processed/upcoming_merged.csv
  unmatched_historical_debug_csv: outputs/debug/unmatched_historical_results.csv

  historical_results_schema:
    match_date: match_date
    tour: tour
    tournament: tournament
    surface: surface
    round: round
    winner_name: winner_name
    loser_name: loser_name

  odds_schema:
    odds_date: match_date
    tour: tour
    tournament: tournament
    player_1: player_1
    player_2: player_2
    odds_p1: odds_p1
    odds_p2: odds_p2

  upcoming_matches_schema:
    match_date: match_date
    tour: tour
    tournament: tournament
    surface: surface
    round: round
    player_1: player_1
    player_2: player_2

features:
  recent_windows: [5, 10]
  h2h_decay: 0.5
  min_matches_for_stats: 3

model:
  target: p1_win
  test_start_date: 2024-01-01
  calibration_method: isotonic
  use_xgboost_if_available: true

pricing:
  default_min_edge: 0.03
  odds_format: decimal

bankroll:
  starting_bankroll: 10000
  staking_mode: half_kelly
  flat_stake: 50
  max_stake_pct: 0.02

backtest:
  retrain_frequency_days: 30
  min_edge_thresholds: [0.02, 0.03, 0.04]
  start_date: 2024-01-01

daily_picks:
  include_atp: true
  include_wta: true
  include_challenger: false
  minimum_edge: 0.03
  current_bankroll: 10000
  staking_style: half_kelly   # one of: flat, kelly, half_kelly, quarter_kelly
  flat_bet_size: 50
  max_bet_pct: 0.02
  min_bet_amount: 5
